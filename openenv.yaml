    description: Poster layout optimization with hero image, title hierarchy, CTA placement, and alignment.
    max_steps: 7
    reward_range: [0.0, 1.0]
    score_range: [0.0, 1.0]
    grader:
      type: programmatic
      name: deterministic_layout_utility
      deterministic: true
      source: server/DesignGym_environment.py

